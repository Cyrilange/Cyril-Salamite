version: '3.8'

services:
  # Service Frontend (React)
  frontend:
    container_name: 42_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

  # Service Backend (Node.js)
  backend:
    container_name: 42_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules
  
      - ./backend/c_programs:/app/c_programs
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: bridge